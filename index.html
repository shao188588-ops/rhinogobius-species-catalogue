<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Rhinogobius valid species catalogue with type localities and reference access." />
    <title>Rhinogobius Species Catalogue</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero compact-hero" aria-label="Catalogue summary">
        <div class="catalogue-brand">
          <p class="eyebrow">SPECIES CATALOGUE</p>
          <h1><em>Rhinogobius</em></h1>
        </div>
        <div class="headline-stat">
          <strong id="species-count">—</strong>
          <span>有效物种</span>
        </div>
        <div class="headline-stat updated">
          <time datetime="2026-07-16">2026-07-16</time>
          <span>更新时间</span>
        </div>
      </header>

      <section class="controls" aria-label="Search and filters">
        <label class="search-field">
          <span>检索</span>
          <input id="search" type="search" placeholder="学名、中文名、模式产地或作者" autocomplete="off" />
        </label>
        <label>
          <span>DNA 描述</span>
          <select id="dna-filter">
            <option value="all">全部</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
            <option value="blank">未标注</option>
          </select>
        </label>
        <label>
          <span>文献状态</span>
          <select id="reference-filter">
            <option value="all">全部</option>
            <option value="local">本地文献</option>
            <option value="cas">CASlink</option>
          </select>
        </label>
        <button id="reset" type="button">重置筛选</button>
      </section>

      <section class="catalogue" aria-live="polite">
        <div class="table-meta"><span id="result-count">载入中…</span></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Scientific name</th>
                <th>Standard Chinese name</th>
                <th>Authorship</th>
                <th>Original combination</th>
                <th>Type locality</th>
                <th>Described with DNA?</th>
                <th>Reference</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="species-table"></tbody>
          </table>
        </div>
      </section>

    </main>
    <script src="app.js"></script>
  </body>
</html>
