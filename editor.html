<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Rhinogobius Layout Studio</title>
    <link rel="stylesheet" href="editor.css" />
  </head>
  <body>
    <aside class="studio-panel" aria-label="可视化布局工作台">
      <header>
        <p class="eyebrow">RHINOGOBIUS</p>
        <h1>Layout Studio</h1>
        <p class="intro">在右侧单击标题、鱼图、统计卡片、主题/语言按钮或空白标题区；仅显示所选对象的设置。</p>
      </header>
      <div class="studio-tools" aria-label="新增元素">
        <button id="add-operation" type="button">＋ 操作 UI</button>
        <button id="add-graphic" type="button">＋ 图形/文字</button>
      </div>
      <section class="layers-panel" aria-label="元素面板">
        <h2>元素</h2>
        <div id="layers" class="layers"></div>
      </section>
      <section id="inspector" class="inspector" aria-live="polite">
        <p class="empty-state">尚未选择元素。预览中的表格与搜索栏不会进入排版编辑。</p>
      </section>
      <footer class="studio-footer">
        <button id="deselect" type="button">取消选择</button>
        <button id="reset-layout" type="button">恢复默认</button>
        <button id="copy-layout" type="button">复制配置</button>
        <p id="studio-status" class="studio-status" role="status">配置仅保存在此浏览器。</p>
      </footer>
    </aside>
    <main class="studio-preview">
      <div class="preview-toolbar"><span>实时预览</span><a href="index.html" target="_blank" rel="noreferrer">打开目录页 ↗</a></div>
      <iframe id="catalogue-preview" title="Rhinogobius catalogue preview" src="index.html"></iframe>
    </main>
    <script src="editor.js?v=layout-studio-20260717"></script>
  </body>
</html>
